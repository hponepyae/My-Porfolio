<section id="projects" class="relative py-16 md:py-24">
  <div class="container-shell">
    <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
      <div>
        <div class="font-display text-xs uppercase tracking-wide2 text-gold-500">
          Projects
        </div>
        <h2 class="mt-3 font-display text-3xl sm:text-4xl">
          Selected work
        </h2>
        <p class="mt-4 max-w-2xl text-white/65">
          A grid-based showcase that matches the hero’s bold typography and gold
          accents. Replace these placeholders with your real projects.
        </p>
      </div>
      <a class="btn-gold-outline mt-3 md:mt-0" href="#contact">Request a quote</a>
    </div>

    <div class="mt-10 grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
      <article
        *ngFor="let p of projects"
        class="group card overflow-hidden transition-transform duration-300 hover:-translate-y-1"
      >
        <div class="relative aspect-[16/10] overflow-hidden border-b border-white/10 bg-ink-900/40">
          <div class="absolute inset-0 bg-[radial-gradient(600px_260px_at_30%_0%,rgba(242,183,5,.18),transparent_60%)] opacity-70"></div>
          <div class="absolute inset-0 p-5 flex items-end justify-between">
            <span class="chip">{{ p.tag }}</span>
            <span class="text-xs font-display uppercase tracking-wide2 text-white/50">
              View
            </span>
          </div>
        </div>

        <div class="p-6">
          <h3 class="font-display text-xl">{{ p.title }}</h3>
          <p class="mt-2 text-sm text-white/65">{{ p.description }}</p>
          <div class="mt-5 flex items-center gap-2 text-gold-500">
            <span class="text-xs font-display uppercase tracking-wide2">Details</span>
            <svg
              class="h-4 w-4 transition-transform duration-300 group-hover:translate-x-1"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M5 12H19M19 12L13 6M19 12L13 18"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
